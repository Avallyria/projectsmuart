<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100vw;
    margin: 0;
    overflow: hidden; 
    background-image: linear-gradient(to top, rgba(255,255,255,0.3), rgba(255,255,255,0.3)), url("https://i.postimg.cc/PqknGzY6/ebea9db9-2d9d-4f60-8cef-808bbe34e07a-(1).jpg"); 
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
}

/* LOGO */
.smuart{
    height:135px;
    position: absolute;
    top: 70.5%;
    left: 84%;
    z-index: 2;
}

/* IMAGE BUTTONS */
.hero-button {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    /* overflow: hidden; REMOVED so the title can sit outside */
    position: relative;
    cursor: pointer;
	transition: transform 0.3s, background-color 0.3s;
    background: none;
    border: none;
    padding: 0;
}

.hero-button img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%; /* MOVED HERE so the image stays a perfect circle */
    display: block; 
    transition: filter 0.3s;
}

/* THE NUMBER (Inside the circle) */
.number {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 50px;
    color: white;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
}

/* THE TITLE (Outside the circle) */
.title {
    position: absolute;
    top: 110%; /* Pushes the text just below the circle */
    left: 50%;
    transform: translateX(-50%); /* Centers it horizontally */
    font-family: Arial, sans-serif;
    font-size: 15px;
    font-weight: bold;
    color: #333;
    background-color: rgba(255, 255, 255, 0.9); /* White pill background for readability */
    padding: 6px 14px;
    border-radius: 20px;
    white-space: nowrap; /* Prevents text from breaking into two lines */
    box-shadow: 0 3px 6px rgba(0,0,0,0.2);
    opacity: 0;
    transition: opacity 0.3s ease, top 0.3s ease;
    pointer-events: none;
    z-index: 10;
}

/* HOVER EFFECTS */
.hero-button:hover .number,
.hero-button:hover .title {
    opacity: 1; /* Shows both texts on hover */
}

.hero-button:hover {
    transform: scale(1.1);
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    background-color: black;
}

.hero-button:hover img {
    filter: brightness(0.3);
}

/* BUTTON POSITIONS */
.one { position: absolute; top: 20%; left: 49%; }
.two { position: absolute; top: 4%; left: 6%; }
.three { position: absolute; top: 15%; left: 83%; }
.four { position: absolute; top: 40%; left: 17%; }
.five { position: absolute; top: 5%; left: 65%; }
.six { position: absolute; top: 10%; left: 30%; }
.seven { position: absolute; top: 50%; left: 37%; }
.eight { position: absolute; top: 50%; left: 60%; }

/* FOOTER */
footer{
    background:#8b6c5c;
	width: 98.7vw;
    color:white;
    text-align:center;
    padding: 10px;
	position: absolute;
	bottom: 0%;
}

.foot-text { font-size: 20px; }

/* FONTS */
.p1 { font-family: "Papyrus", Papyrus, fantasy; }
.p2 { font-family: "Copperplate", Copperplate, fantasy; }
.p3 { font-family: "Garamond", Garamond, serif; }
.p4 { font-family: "Verdana", Verdana, cursive; }
.p5 { font-family: "Brush Script MT", Brush, cursive; }
.p6 { font-family: "Times New Roman", Times, serif; }
.p7 { font-family: "Lucida Handwriting", Lucida, cursive; }

/* MOBILE STYLES */
@media (max-width: 768px) {
    html, body {
        overflow: hidden !important;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        scroll-padding-left: 0;
    }

    body {
        min-width: 150vw; 
        min-height: 125vh;
        background-size: cover;
        background-attachment: fixed; 
		background-position: center;
    }

    .hero-button {
        width: 50px !important; 
        height: 50px !important;
		transform: translateZ(0);
    }
    
    /* Adjust text size for mobile */
    .number { font-size: 30px; }
    .title { font-size: 12px; padding: 4px 10px; }

	.one { position: fixed; top: 30%; left: 50%; transform: translateZ(0); }
	.two { position: fixed; }
	.three { position: fixed; left: 80%; transform: translateZ(0); }
	.four { position: fixed; top: 50%; left: 75%; }
	.five { position: fixed; left: 55%; transform: translateZ(0); }
	.six { position: fixed; top: 20%; left: 20%; transform: translateZ(0); }
	.seven { position: fixed; top: 57%; left: 17%; transform: translateZ(0); }
	.eight { position: fixed; left: 10%; top: 37%; transform: translateZ(0); }
	
	.smuart {
		height: 90px;
		position: fixed;
		top: 73%;
		left: 32%;
	}
	
    footer {
        position: fixed; 
        width: 100vw;
        left: 0;
        z-index: 99;
    }
	
	.foot-text {
		font-size: 15px;
		margin-left: 0;
    }
}
