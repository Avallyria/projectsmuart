body {
    /* Replaced absolute centering trick with Flexbox */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100vw;
    margin: 0;
    overflow: hidden; /* Prevents scrollbars when scaling */
    background-image: linear-gradient(to top, rgba(255,255,255,0.3), rgba(255,255,255,0.3)), url("https://i.postimg.cc/PqknGzY6/ebea9db9-2d9d-4f60-8cef-808bbe34e07a-(1).jpg"); 
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
}

/* LOGO */
.smuart{
    height:135px;
    position: absolute;
    top: 70.5%;
    left: 84%;
    z-index: 2;
}

/* IMAGE BUTTONS */
.hero-button {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    overflow: hidden;   /* ensures image stays inside circle */
    position: relative;
    cursor: pointer;
	transition: transform 0.3s, filter 0.3s, background-color 0.3s;
    background: none;
    border: none;
    padding: 0;
}

.hero-button img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block; /* removes tiny gaps */
    transition: transform 0.3s, filter 0.5s, background-color 0.3s;
}

/* Hide text initially */
.button-text {
    font-size: 70px;
    color: white;
    opacity: 0;
    transition: opacity 0.5s;

    position: absolute;
    top: 25%;
    left: 50%;
    transform: translate(-60%, -95%);
}

/* When hovering the button, show text */
.hero-button:hover .button-text {
    opacity: 1;
}

/* Optional: button hover effect */
.hero-button:hover{
    transform: scale(1.1);
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    background-color: black;
}

.hero-button:hover img {
    filter: brightness(0); /* makes image completely black */
}

@media (max-width: 768px) {
    /* 1. ENABLE SWIPING/PANNING */
    html, body {
        overflow: hidden; !important;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        /* Scroll-padding-left ensures the browser snaps to the start */
        scroll-padding-left: 0;
    }

    /* 2. SET THE CANVAS SIZE */
    /* This forces the 'world' to be 150% wider than the phone screen 
       so those 'left: 81%' buttons have a place to exist */
    body {
        min-width: 150vw; 
        min-height: 125vh;
        background-size: cover;
        background-attachment: fixed; /* Keeps background still while you scroll buttons */
		background-position: center;
    }

    /* 3. SCALE BUTTONS DOWN */
    .hero-button {
        width: 50px !important; 
        height: 50px !important;
		transform: translateZ(0);
    }
